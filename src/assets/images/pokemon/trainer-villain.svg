<?xml version="1.0" encoding="UTF-8"?>
<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Stylized Pokemon Villain Trainer -->
  <g transform="translate(25,10)">
    <!-- Head and Face -->
    <circle cx="50" cy="30" r="25" fill="#FFD3B4"/>
    <!-- Hair -->
    <path d="M25,15 C25,5 35,0 50,0 C65,0 75,5 75,15 
             C75,25 85,20 85,30 C85,40 75,30 75,35
             C75,40 80,45 75,50 C70,55 65,45 65,40
             L35,40 C35,45 30,55 25,50
             C20,45 25,40 25,35 C25,30 15,40 15,30
             C15,20 25,25 25,15 Z" fill="#6033AA"/>
    <!-- Eyes -->
    <circle cx="40" cy="30" r="3" fill="#000000"/>
    <circle cx="60" cy="30" r="3" fill="#000000"/>
    <!-- Evil Smirk -->
    <path d="M40,40 C45,38 55,38 60,40" fill="none" stroke="#000000" stroke-width="1" stroke-linecap="round"/>
    <!-- Body -->
    <path d="M35,55 L30,100 L70,100 L65,55 Z" fill="#6033AA"/>
    <!-- Arms -->
    <path d="M35,55 L15,85 L25,90 L40,65 Z" fill="#6033AA"/>
    <path d="M65,55 L85,85 L75,90 L60,65 Z" fill="#6033AA"/>
    <!-- Pants -->
    <path d="M30,100 L25,130 L45,130 L50,100 Z" fill="#444444"/>
    <path d="M50,100 L55,130 L75,130 L70,100 Z" fill="#444444"/>
    <!-- Shoes -->
    <path d="M25,130 L45,130 L45,135 L25,135 Z" fill="#000000"/>
    <path d="M55,130 L75,130 L75,135 L55,135 Z" fill="#000000"/>
    <!-- Evil Emblem -->
    <path d="M50,75 L45,65 L55,65 Z" fill="#FF0000"/>
    <circle cx="50" cy="75" r="5" fill="#FF0000"/>
  </g>
</svg>
