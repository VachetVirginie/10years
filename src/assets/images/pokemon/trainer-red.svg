<?xml version="1.0" encoding="UTF-8"?>
<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Stylized Pokemon Trainer Red -->
  <g transform="translate(25,10)">
    <!-- Head and Face -->
    <circle cx="50" cy="30" r="25" fill="#FFD3B4"/>
    <!-- Hat -->
    <path d="M25,25 C25,15 35,5 50,5 C65,5 75,15 75,25 L75,35 L25,35 Z" fill="#FF0000"/>
    <rect x="25" y="30" width="50" height="10" fill="#FFFFFF"/>
    <circle cx="50" cy="35" r="7" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
    <circle cx="50" cy="35" r="3" fill="#FF0000"/>
    <!-- Eyes -->
    <circle cx="40" cy="30" r="3" fill="#000000"/>
    <circle cx="60" cy="30" r="3" fill="#000000"/>
    <!-- Smile -->
    <path d="M45,40 C45,45 55,45 55,40" fill="none" stroke="#000000" stroke-width="1" stroke-linecap="round"/>
    <!-- Body -->
    <path d="M35,55 L30,100 L70,100 L65,55 Z" fill="#FF0000"/>
    <!-- Arms -->
    <path d="M35,55 L15,85 L25,90 L40,65 Z" fill="#FF0000"/>
    <path d="M65,55 L85,85 L75,90 L60,65 Z" fill="#FF0000"/>
    <!-- Pants -->
    <path d="M30,100 L25,130 L45,130 L50,100 Z" fill="#6890F0"/>
    <path d="M50,100 L55,130 L75,130 L70,100 Z" fill="#6890F0"/>
    <!-- Shoes -->
    <path d="M25,130 L45,130 L45,135 L25,135 Z" fill="#000000"/>
    <path d="M55,130 L75,130 L75,135 L55,135 Z" fill="#000000"/>
  </g>
</svg>
